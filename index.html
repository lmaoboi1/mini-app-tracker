<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok & Telegram Merger</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- XLSX library (pre-loaded for Excel support) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10%); }
        }
        .animate-bounce-short {
            animation: bounce-short 0.5s ease-in-out;
        }
        
        /* Drag UI hints */
        .drag-over {
            border-left: 3px solid #3b82f6 !important;
            background-color: rgba(59, 130, 246, 0.1) !important;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-2 sm:p-4 font-sans transition-colors duration-200">
    <div class="w-full px-2 mx-auto space-y-4">
        
        <!-- Header -->
        <header class="mb-4">
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-slate-900 dark:text-white flex items-center gap-2">
                <i data-lucide="git-merge" class="w-6 h-6 sm:w-8 sm:h-8 text-blue-600 dark:text-blue-400"></i>
                TikTok & Telegram Merger
            </h1>
            <p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 mt-1">
                Merge TikTok pivot tables with Telegram bot event history for customized CPA metrics.
            </p>
        </header>

        <!-- Controls Card (Collapsible) -->
        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
            
            <button id="toggleControlsBtn" class="w-full flex items-center justify-between p-3 sm:p-4 bg-slate-50 dark:bg-slate-800/80 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors border-b border-slate-200 dark:border-slate-700">
                <span class="font-semibold text-slate-700 dark:text-slate-200 flex items-center gap-2 text-sm sm:text-base">
                    <i data-lucide="settings-2" class="w-4 h-4 sm:w-5 sm:h-5"></i> Configuration & Data Sources
                </span>
                <i data-lucide="chevron-up" id="controlsChevron" class="w-5 h-5 text-slate-500 transition-transform duration-300"></i>
            </button>

            <div id="controlsContainer" class="p-4 sm:p-6 transition-all duration-300">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                    
                    <!-- File Uploads -->
                    <div class="space-y-3">
                        <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Data Sources</h3>
                        
                        <div class="flex flex-col gap-2">
                            <label id="csvDropZone" class="flex items-center p-3 sm:p-4 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-lg cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors">
                                <i data-lucide="file-spreadsheet" class="w-5 h-5 sm:w-6 sm:h-6 mr-3 text-green-600 dark:text-green-400" id="csvIcon"></i>
                                <div class="flex-1 overflow-hidden">
                                    <span id="csvFileName" class="block text-xs sm:text-sm font-medium truncate">Upload TikTok Pivot (XLSX/CSV)</span>
                                    <span class="block text-[10px] sm:text-xs text-slate-500 dark:text-slate-400 mt-0.5">Drag & drop or click</span>
                                </div>
                                <input type="file" id="csvInput" accept=".csv,.xlsx,.xls" class="hidden" />
                                <i data-lucide="upload" class="w-4 h-4 sm:w-5 sm:h-5 text-slate-400" id="csvUploadIcon"></i>
                            </label>

                            <label id="htmlDropZone" class="flex items-center p-3 sm:p-4 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-lg cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors">
                                <i data-lucide="message-circle" class="w-5 h-5 sm:w-6 sm:h-6 mr-3 text-blue-500 dark:text-blue-400" id="htmlIcon"></i>
                                <div class="flex-1 overflow-hidden">
                                    <span id="htmlFileName" class="block text-xs sm:text-sm font-medium truncate">Upload Telegram Messages (HTML)</span>
                                    <span class="block text-[10px] sm:text-xs text-slate-500 dark:text-slate-400 mt-0.5">Drag & drop or click</span>
                                </div>
                                <input type="file" id="htmlInput" accept=".html" class="hidden" />
                                <i data-lucide="upload" class="w-4 h-4 sm:w-5 sm:h-5 text-slate-400" id="htmlUploadIcon"></i>
                            </label>
                        </div>
                    </div>

                    <!-- Date Filtering -->
                    <div class="space-y-3">
                        <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                            Telegram Settings & Filters
                        </h3>

                        <!-- Buyer Filter -->
                        <div class="space-y-1">
                            <label class="text-[10px] sm:text-xs text-slate-500 dark:text-slate-400 block">Target Buyer (e.g. SLT)</label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-2.5 top-2 w-4 h-4 text-slate-400"></i>
                                <input type="text" id="buyerInput" placeholder="Leave empty for all" class="w-full pl-8 pr-2 py-1.5 sm:py-2 text-xs sm:text-sm bg-transparent border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none dark:text-white" />
                            </div>
                        </div>
                        
                        <div class="flex gap-3">
                            <div class="flex-1 space-y-1">
                                <label class="text-[10px] sm:text-xs text-slate-500 dark:text-slate-400 block">Start Date (LA)</label>
                                <div class="relative">
                                    <i data-lucide="calendar" class="absolute left-2.5 top-2 w-4 h-4 text-slate-400"></i>
                                    <input type="date" id="startDate" class="w-full pl-8 pr-2 py-1.5 sm:py-2 text-xs sm:text-sm bg-transparent border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none dark:text-white" />
                                </div>
                            </div>
                            <div class="flex-1 space-y-1">
                                <label class="text-[10px] sm:text-xs text-slate-500 dark:text-slate-400 block">End Date (LA)</label>
                                <div class="relative">
                                    <i data-lucide="calendar" class="absolute left-2.5 top-2 w-4 h-4 text-slate-400"></i>
                                    <input type="date" id="endDate" class="w-full pl-8 pr-2 py-1.5 sm:py-2 text-xs sm:text-sm bg-transparent border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none dark:text-white" />
                                </div>
                            </div>
                        </div>

                        <div class="pt-3">
                            <button id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white text-sm sm:text-base font-medium py-2 sm:py-2.5 px-4 rounded-lg transition-colors flex justify-center items-center">
                                Merge & Process Data
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Column Configuration Settings -->
                <div id="columnConfigContainer" class="mt-6 pt-4 border-t border-slate-200 dark:border-slate-700 hidden">
                    <div class="flex items-center gap-2 mb-3">
                        <i data-lucide="settings" class="w-4 h-4 sm:w-5 sm:h-5 text-slate-500 dark:text-slate-400"></i>
                        <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Column Visibility</h3>
                    </div>
                    <div id="columnCheckboxes" class="flex flex-wrap gap-2">
                        <!-- Checkboxes rendered dynamically here -->
                    </div>
                </div>
                
                <div id="errorContainer" class="hidden mt-4 p-3 bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-400 rounded-lg flex items-center border border-red-200 dark:border-red-800">
                    <i data-lucide="alert-circle" class="w-5 h-5 mr-2 flex-shrink-0"></i>
                    <p id="errorMessage" class="text-xs sm:text-sm"></p>
                </div>
            </div>
        </div>

        <!-- Data Table Section -->
        <div id="tableSection" class="hidden bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col">
            
            <!-- Table Toolbar -->
            <div class="p-3 border-b border-slate-200 dark:border-slate-700 flex flex-col sm:flex-row justify-between items-center gap-3 bg-slate-50/50 dark:bg-slate-800/50">
                <div class="relative w-full sm:w-96">
                    <i data-lucide="search" class="absolute left-3 top-2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Filter by text, stats (spend>50) or status (status:true)..." class="w-full pl-9 pr-3 py-1.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-xs sm:text-sm dark:text-white" />
                </div>
                <div id="recordCount" class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 font-medium">
                    Showing 0 records
                </div>
            </div>

            <!-- Responsive Table Wrapper -->
            <div class="overflow-auto max-h-[75vh] relative" id="tableWrapper">
                <table class="w-full text-left text-xs whitespace-nowrap">
                    <thead id="tableHead" class="sticky top-0 z-20 shadow-sm bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-300">
                        <!-- Head rendered dynamically -->
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-200 dark:divide-slate-700">
                        <!-- Body rendered dynamically -->
                    </tbody>
                    <tfoot id="tableFoot" class="sticky bottom-0 z-20 shadow-[0_-1px_3px_rgba(0,0,0,0.1)] dark:shadow-[0_-1px_3px_rgba(0,0,0,0.3)] bg-slate-200 dark:bg-slate-700">
                        <!-- Footer rendered dynamically -->
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <!-- Floating Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 z-50 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-green-400 dark:text-green-600"></i>
        <span id="toastMessage" class="text-sm font-medium"></span>
    </div>

    <script>
        // Migrate column names so local storage is not broken
        const renameMapExact = {
            'Cost per conversion': 'CPA TS',
            'CPC (destination)': 'CPC',
            'Clicks (destination)': 'Clicks',
            'CTR (destination)': 'CTR',
            'Registrations (website)': 'Regs',
            'Cost per registration (website)': 'CPR',
            'Cost per registration': 'CPR'
        };
        const migrateCols = (arr) => arr.map(c => renameMapExact[c] || c);

        // --- State Management ---
        const state = {
            csvFile: null,
            htmlFile: null,
            data: [],
            headers: [],
            columnOrder: migrateCols(JSON.parse(localStorage.getItem('tiktok_telegram_col_order')) || []),
            pinnedColumns: migrateCols(JSON.parse(localStorage.getItem('tiktok_telegram_pinned_cols')) || ['Status']),
            hiddenColumns: migrateCols(JSON.parse(localStorage.getItem('tiktok_telegram_hidden_cols')) || []),
            searchQuery: '',
            sortCol: null,
            sortDesc: false,
            adGroupStatuses: JSON.parse(localStorage.getItem('tiktok_telegram_adgroup_statuses')) || {},
            targetBuyer: localStorage.getItem('tiktok_telegram_target_buyer') !== null ? localStorage.getItem('tiktok_telegram_target_buyer') : 'SLT'
        };

        // --- RPC Mappings ---
        const rpcMap = {
            "UA": 16, "US": 20, "AU": 20, "PL": 15, "CZ": 17.3, "MX": 13, "DE": 18,
            "FR": 20, "SK": 19, "BE": 20, "IL": 21, "ES": 15, "LV": 13, "LT": 13,
            "AT": 21, "DO": 13, "DK": 20, "GB": 19.2, "CA": 25, "IT": 17, "ZA": 16.2,
            "NL": 17.9, "PT": 16, "IE": 13.8, "HR": 17.5, "NZ": 19.2, "GR": 15.4,
            "PR": 18.5, "CO": 14.85
        };

        const countryCodes = {
            "Albania": "AL", "Algeria": "DZ", "Andorra": "AD", "Angola": "AO", "Argentina": "AR",
            "Armenia": "AM", "Aruba": "AW", "Australia": "AU", "Austria": "AT", "Azerbaijan": "AZ",
            "Bahamas": "BS", "Bahrain": "BH", "Bangladesh": "BD", "Barbados": "BB", "Belarus": "BY",
            "Belgium": "BE", "Benin": "BJ", "Bolivia": "BO", "Bosnia and Herzegovina": "BA",
            "Botswana": "BW", "Brazil": "BR", "Brunei Darussalam": "BN", "Bulgaria": "BG",
            "Burundi": "BI", "Cambodia": "KH", "Cameroon": "CM", "Canada": "CA",
            "Central African Republic": "CF", "Chad": "TD", "Chile": "CL", "Colombia": "CO",
            "Costa Rica": "CR", "Croatia": "HR", "Curacao": "CW", "Cyprus": "CY",
            "Czech Republic": "CZ", "Democratic Republic Congo": "CD", "Denmark": "DK",
            "Djibouti": "DJ", "Dominican Republic": "DO", "Ecuador": "EC", "Egypt": "EG",
            "El Salvador": "SV", "Equatorial Guinea": "GQ", "Eritrea": "ER", "Estonia": "EE",
            "Ethiopia": "ET", "Fiji": "FJ", "Finland": "FI", "France": "FR", "Gabon": "GA",
            "Gambia": "GM", "Georgia": "GE", "Germany": "DE", "Ghana": "GH", "Greece": "GR",
            "Guatemala": "GT", "Guinea": "GN", "Guyana": "GY", "Haiti": "HT", "Honduras": "HN",
            "Hong Kong": "HK", "Hungary": "HU", "Iceland": "IS", "India": "IN", "Indonesia": "ID",
            "Iraq": "IQ", "Ireland": "IE", "Israel": "IL", "Italy": "IT", "Ivory Coast": "CI",
            "Jamaica": "JM", "Japan": "JP", "Jordan": "JO", "Kazakhstan": "KZ", "Kenya": "KE",
            "Kosovo": "XK", "Kuwait": "KW", "Kyrgyzstan": "KG", "Laos": "LA", "Latvia": "LV",
            "Lebanon": "LB", "Lesotho": "LS", "Liberia": "LR", "Libya": "LY", "Liechtenstein": "LI",
            "Lithuania": "LT", "Luxembourg": "LU", "Madagascar": "MG", "Malawi": "MW",
            "Malaysia": "MY", "Maldives": "MV", "Mali": "ML", "Malta": "MT", "Mauritania": "MR",
            "Mauritius": "MU", "Mexico": "MX", "Moldova": "MD", "Monaco": "MC", "Mongolia": "MN",
            "Montenegro": "ME", "Morocco": "MA", "Mozambique": "MZ", "Myanmar": "MM",
            "Namibia": "NA", "Nepal": "NP", "Netherlands": "NL", "New Zealand": "NZ",
            "Nicaragua": "NI", "Niger": "NE", "Nigeria": "NG", "North Macedonia": "MK",
            "Norway": "NO", "Oman": "OM", "Pakistan": "PK", "Panama": "PA",
            "Papua New Guinea": "PG", "Paraguay": "PY", "Peru": "PE", "Philippines": "PH",
            "Poland": "PL", "Portugal": "PT", "Puerto Rico": "PR", "Qatar": "QA",
            "Republic of Congo": "CG", "Romania": "RO", "Rwanda": "RW", "Saudi Arabia": "SA",
            "Senegal": "SN", "Serbia": "RS", "Sierra Leone": "SL", "Singapore": "SG",
            "Slovakia": "SK", "Slovenia": "SI", "South Africa": "ZA", "South Korea": "KR",
            "Spain": "ES", "Sri Lanka": "LK", "Suriname": "SR", "Sweden": "SE",
            "Switzerland": "CH", "Taiwan": "TW", "Tajikistan": "TJ", "Tanzania": "TZ",
            "Thailand": "TH", "Togo": "TG", "Trinidad and Tobago": "TT", "Tunesia": "TN",
            "Turkey": "TR", "Turkmenistan": "TM", "Uganda": "UG", "Ukraine": "UA",
            "United Arab Emirates": "AE", "United Kingdom": "GB", "United States": "US",
            "Uruguay": "UY", "Uzbekistan": "UZ", "Vietnam": "VN", "Venezuela": "VE",
            "Zambia": "ZM", "Zimbabwe": "ZW", "World Wide": "WW"
        };

        const getRPC = (countryInput) => {
            if (!countryInput) return "";
            let code = countryInput.toString().trim().toUpperCase();
            
            // If full name is provided
            if (code.length > 2) {
                const matchedKey = Object.keys(countryCodes).find(k => k.toUpperCase() === code);
                if (matchedKey) {
                    code = countryCodes[matchedKey];
                }
            }
            return rpcMap[code] !== undefined ? rpcMap[code] : "";
        };

        // --- Utility Functions ---
        const getTodayLADate = () => {
            return new Intl.DateTimeFormat('en-CA', {
                timeZone: 'America/Los_Angeles',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).format(new Date());
        };

        const getLADateString = (dateStr) => {
            if (!dateStr) return null;
            const match = dateStr.match(/(\d{2})\.(\d{2})\.(\d{4})\s(\d{2}:\d{2}:\d{2})\sUTC([+-]\d{2}:\d{2})/);
            if (match) {
                const [, day, month, year, time, offset] = match;
                const isoString = `${year}-${month}-${day}T${time}${offset}`;
                const dateObj = new Date(isoString);
                if (!isNaN(dateObj)) {
                    return new Intl.DateTimeFormat('en-CA', {
                        timeZone: 'America/Los_Angeles',
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit'
                    }).format(dateObj);
                }
            }
            return null;
        };

        const parseCSV = (str) => {
            const rows = [];
            let cur = '';
            let inQuote = false;
            let row = [];

            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                const nextChar = str[i + 1];

                if (char === '"' && inQuote && nextChar === '"') {
                    cur += '"';
                    i++; 
                } else if (char === '"') {
                    inQuote = !inQuote;
                } else if (char === ',' && !inQuote) {
                    row.push(cur.trim());
                    cur = '';
                } else if ((char === '\n' || char === '\r') && !inQuote) {
                    if (char === '\r' && nextChar === '\n') i++; 
                    row.push(cur.trim());
                    if (row.join('') !== '') rows.push(row);
                    row = [];
                    cur = '';
                } else {
                    cur += char;
                }
            }
            if (cur !== '' || row.length > 0) {
                row.push(cur.trim());
                if (row.join('') !== '') rows.push(row);
            }
            return rows;
        };

        const toggleAdGroupStatus = (adGroupId) => {
            if (!adGroupId) return;
            const currentValue = state.adGroupStatuses[adGroupId] !== false;
            state.adGroupStatuses[adGroupId] = !currentValue;
            try {
                localStorage.setItem('tiktok_telegram_adgroup_statuses', JSON.stringify(state.adGroupStatuses));
            } catch (e) {
                console.warn('Could not save to localStorage', e);
            }
            renderTable();
        };

        const togglePin = (colName) => {
            if (!colName) return;
            if (state.pinnedColumns.includes(colName)) {
                state.pinnedColumns = state.pinnedColumns.filter(c => c !== colName);
            } else {
                state.pinnedColumns.push(colName);
            }

            // Enforce pinned cols at front
            state.columnOrder = [
                ...state.columnOrder.filter(c => state.pinnedColumns.includes(c)),
                ...state.columnOrder.filter(c => !state.pinnedColumns.includes(c))
            ];

            try {
                localStorage.setItem('tiktok_telegram_pinned_cols', JSON.stringify(state.pinnedColumns));
                localStorage.setItem('tiktok_telegram_col_order', JSON.stringify(state.columnOrder));
            } catch (e) {
                console.warn('Could not save to localStorage', e);
            }
            renderTable();
        };

        const toggleColumnVisibility = (colName) => {
            if (state.hiddenColumns.includes(colName)) {
                state.hiddenColumns = state.hiddenColumns.filter(c => c !== colName);
            } else {
                state.hiddenColumns.push(colName);
            }
            try {
                localStorage.setItem('tiktok_telegram_hidden_cols', JSON.stringify(state.hiddenColumns));
            } catch (e) {
                console.warn('Could not save to localStorage', e);
            }
            renderTable();
            renderColumnConfig();
        };

        const updateStickyStyles = () => {
            const styleTag = document.getElementById('sticky-styles') || document.createElement('style');
            styleTag.id = 'sticky-styles';
            
            const ths = document.querySelectorAll('#tableHead th');
            if (ths.length === 0) return;

            let css = '';
            let currentLeft = 0;

            const visibleColumns = state.columnOrder.filter(c => !state.hiddenColumns.includes(c));
            
            visibleColumns.forEach((col, idx) => {
                if (state.pinnedColumns.includes(col)) {
                    css += `
                        #tableWrapper tr > *:nth-child(${idx + 1}) {
                            left: ${currentLeft}px !important;
                        }
                    `;
                    currentLeft += ths[idx].offsetWidth;
                }
            });

            if (!document.getElementById('sticky-styles')) {
                document.head.appendChild(styleTag);
            }
            styleTag.innerHTML = css;
        };

        const showToast = (message) => {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('animate-bounce-short');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('animate-bounce-short');
            }, 3000);
        };

        const showError = (message) => {
            const container = document.getElementById('errorContainer');
            if (message) {
                document.getElementById('errorMessage').textContent = message;
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        };

        // --- Core Processing Logic ---
        const handleProcessData = async () => {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!state.csvFile || !state.htmlFile) {
                showError('Please upload both the TikTok Pivot (CSV/XLSX) and the Telegram HTML files.');
                return;
            }

            const btn = document.getElementById('processBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';
            showError('');

            try {
                const htmlText = await state.htmlFile.text();

                // 1. Process Telegram HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                const messages = doc.querySelectorAll('.message');
                const telegramConversions = {}; 

                messages.forEach(msg => {
                    const textEl = msg.querySelector('.text');
                    const dateEl = msg.querySelector('.date.details');

                    if (textEl && dateEl) {
                        const plainText = textEl.innerHTML.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '');
                        const isPurchase = plainText.includes('New Purchase event');
                        
                        if (isPurchase) {
                            const buyerMatch = plainText.match(/Buyer:\s*(.+)/);
                            const adGroupMatch = plainText.match(/Adgroup ID:\s*(\d+)/);

                            if (buyerMatch && adGroupMatch) {
                                const buyer = buyerMatch[1].trim();
                                const adGroupId = adGroupMatch[1].trim();
                                
                                const targetBuyer = state.targetBuyer.trim().toLowerCase();

                                if (!targetBuyer || buyer.toLowerCase() === targetBuyer) {
                                    const dateTitle = dateEl.getAttribute('title');
                                    const laDateStr = getLADateString(dateTitle);

                                    let withinDateRange = true;
                                    if (startDate && laDateStr && laDateStr < startDate) withinDateRange = false;
                                    if (endDate && laDateStr && laDateStr > endDate) withinDateRange = false;

                                    if (withinDateRange) {
                                        telegramConversions[adGroupId] = (telegramConversions[adGroupId] || 0) + 1;
                                    }
                                }
                            }
                        }
                    }
                });

                // 2. Process TikTok CSV/XLSX
                let parsedData = [];
                const isXlsx = state.csvFile.name.toLowerCase().match(/\.xlsx?$/);

                if (isXlsx) {
                    parsedData = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            try {
                                const buffer = new Uint8Array(e.target.result);
                                const workbook = window.XLSX.read(buffer, { type: 'array' });
                                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                                const json = window.XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
                                const cleanRows = json.filter(row => row.length > 0 && row.some(cell => cell !== ''));
                                resolve(cleanRows);
                            } catch (err) {
                                reject(new Error('Could not parse the Excel file. Make sure it is a valid .xlsx file.'));
                            }
                        };
                        reader.onerror = () => reject(new Error('Failed to read file'));
                        reader.readAsArrayBuffer(state.csvFile);
                    });
                } else {
                    const csvText = await state.csvFile.text();
                    parsedData = parseCSV(csvText);
                }

                if (parsedData.length < 2) throw new Error('File appears to be empty or lacks data rows.');
                parsedData.pop(); // Remove summary row

                const originalHeaders = parsedData[0];
                const dataRows = parsedData.slice(1);

                const getColIdx = (name) => originalHeaders.findIndex(h => h && h.toString().trim().toLowerCase() === name.toLowerCase());
                const costPerConvIdx = getColIdx('cost per conversion');
                const costIdx = getColIdx('cost');
                const adGroupIdx = getColIdx('ad group id');
                const countryIdx = getColIdx('country/region');

                // Map TikTok column names
                const renameMapLower = {
                    'cost per conversion': 'CPA TS',
                    'cpc (destination)': 'CPC',
                    'clicks (destination)': 'Clicks',
                    'ctr (destination)': 'CTR',
                    'registrations (website)': 'Regs',
                    'cost per registration (website)': 'CPR',
                    'cost per registration': 'CPR'
                };

                const finalHeaders = originalHeaders.map(h => {
                    const low = h && h.toString().trim().toLowerCase();
                    return renameMapLower[low] || h;
                });
                
                const convIdx = finalHeaders.findIndex(h => h && h.toString().trim().toLowerCase() === 'conversions');
                if (convIdx !== -1) finalHeaders.splice(convIdx + 1, 0, 'Conversion PP');
                else finalHeaders.push('Conversion PP');

                const cpaHeaderIdx = finalHeaders.findIndex(h => h && h.toString().trim().toLowerCase() === 'cpa ts');
                if (cpaHeaderIdx !== -1) finalHeaders.splice(cpaHeaderIdx + 1, 0, 'CPA PP');
                else finalHeaders.push('CPA PP');

                // Add RPC
                if (!finalHeaders.includes('RPC')) {
                    finalHeaders.push('RPC');
                }

                finalHeaders.unshift('Status');

                const finalData = dataRows.map(row => {
                    const rowObj = {};
                    originalHeaders.forEach((h, i) => {
                        const low = h && h.toString().trim().toLowerCase();
                        const newH = renameMapLower[low] || h;
                        rowObj[newH] = row[i] || '';
                    });

                    const adGroupId = adGroupIdx !== -1 ? row[adGroupIdx]?.toString().trim() : '';
                    const countryVal = countryIdx !== -1 ? row[countryIdx] : '';
                    const conversionsPP = telegramConversions[adGroupId] || 0;
                    const rawCost = costIdx !== -1 ? parseFloat(row[costIdx]) : 0;
                    const cost = isNaN(rawCost) ? 0 : rawCost;

                    rowObj['_adGroupId'] = adGroupId;
                    rowObj['Conversion PP'] = conversionsPP;
                    rowObj['CPA PP'] = conversionsPP > 0 ? (cost / conversionsPP).toFixed(2) : "0.00";
                    rowObj['RPC'] = getRPC(countryVal);

                    return rowObj;
                });

                state.headers = finalHeaders;
                
                // Integrate Column Order
                if (!state.columnOrder || state.columnOrder.length === 0) {
                    state.columnOrder = [...finalHeaders];
                } else {
                    const existingInNew = state.columnOrder.filter(c => finalHeaders.includes(c));
                    const newCols = finalHeaders.filter(c => !state.columnOrder.includes(c));
                    state.columnOrder = [...existingInNew, ...newCols];
                }
                
                // Enforce pinned constraint
                state.columnOrder = [
                    ...state.columnOrder.filter(c => state.pinnedColumns.includes(c)),
                    ...state.columnOrder.filter(c => !state.pinnedColumns.includes(c))
                ];
                
                try {
                    localStorage.setItem('tiktok_telegram_col_order', JSON.stringify(state.columnOrder));
                } catch(e) {}

                state.data = finalData;
                
                document.getElementById('tableSection').classList.remove('hidden');
                
                // Collapse controls
                const controlsContainer = document.getElementById('controlsContainer');
                const controlsChevron = document.getElementById('controlsChevron');
                controlsContainer.classList.add('hidden');
                controlsChevron.classList.add('rotate-180');
                
                renderColumnConfig();
                renderTable();

            } catch (err) {
                showError(`Failed to process files: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Merge & Process Data';
            }
        };

        // --- Data Filtering and Sorting ---
        const getProcessedData = () => {
            let result = [...state.data];

            if (state.searchQuery) {
                const terms = state.searchQuery.trim().split(/\s+/);
                result = result.filter(row => {
                    return terms.every(term => {
                        const lowerTerm = term.toLowerCase();
                        
                        // Status filtering
                        if (lowerTerm === 'status:true' || lowerTerm === 'status:on') return state.adGroupStatuses[row._adGroupId] !== false;
                        if (lowerTerm === 'status:false' || lowerTerm === 'status:off') return state.adGroupStatuses[row._adGroupId] === false;

                        // Formula filtering
                        const formulaMatch = term.match(/^(.+?)(>=|<=|>|<|=)(.+)$/);
                        if (formulaMatch) {
                            const fieldRaw = formulaMatch[1].toLowerCase();
                            const op = formulaMatch[2];
                            const val = parseFloat(formulaMatch[3]);

                            if (!isNaN(val)) {
                                const field = fieldRaw.replace(/_/g, '');
                                const targetHeader = state.headers.find(h => {
                                    const lowerH = h.toLowerCase().trim();
                                    const noSpaceH = lowerH.replace(/\s+/g, '');
                                    if (field === 'spend' && lowerH === 'cost') return true;
                                    if (field === 'cpa' && lowerH === 'cpa ts') return true;
                                    if (noSpaceH === field) return true;
                                    return false;
                                }) || state.headers.find(h => h.toLowerCase().replace(/\s+/g, '').includes(field));

                                if (targetHeader) {
                                    const rowValStr = row[targetHeader] ? row[targetHeader].toString() : '';
                                    const rowVal = parseFloat(rowValStr);
                                    if (!isNaN(rowVal)) {
                                        if (op === '>') return rowVal > val;
                                        if (op === '<') return rowVal < val;
                                        if (op === '>=') return rowVal >= val;
                                        if (op === '<=') return rowVal <= val;
                                        if (op === '=') return rowVal === val || rowValStr.trim() === formulaMatch[3];
                                    }
                                }
                            }
                        }

                        // Default text search
                        return Object.values(row).some(v => v && v.toString().toLowerCase().includes(lowerTerm));
                    });
                });
            }

            if (state.sortCol) {
                result.sort((a, b) => {
                    if (state.sortCol === 'Status') {
                        const statusA = state.adGroupStatuses[a._adGroupId] !== false ? 1 : 0;
                        const statusB = state.adGroupStatuses[b._adGroupId] !== false ? 1 : 0;
                        return state.sortDesc ? statusB - statusA : statusA - statusB;
                    }

                    let valA = a[state.sortCol];
                    let valB = b[state.sortCol];
                    const numA = parseFloat(valA);
                    const numB = parseFloat(valB);

                    if (!isNaN(numA) && !isNaN(numB)) {
                        return state.sortDesc ? numB - numA : numA - numB;
                    }

                    valA = valA ? valA.toString() : '';
                    valB = valB ? valB.toString() : '';
                    return state.sortDesc ? valB.localeCompare(valA) : valA.localeCompare(valB);
                });
            }

            return result;
        };

        const getSummaryRow = (processedData) => {
            if (!processedData || processedData.length === 0) return null;

            const getHeaderKey = (target) => state.headers.find(h => h.toLowerCase().trim() === target);
            const keyCost = getHeaderKey('cost');
            const keyConversions = getHeaderKey('conversions');
            const keyClicks = getHeaderKey('clicks');
            const keyRegs = getHeaderKey('regs');
            const keyConvPP = getHeaderKey('conversion pp');

            let totals = { cost: 0, conv: 0, clicks: 0, regs: 0, convPP: 0 };

            processedData.forEach(row => {
                if (keyCost) totals.cost += parseFloat(row[keyCost]) || 0;
                if (keyConversions) totals.conv += parseFloat(row[keyConversions]) || 0;
                if (keyClicks) totals.clicks += parseFloat(row[keyClicks]) || 0;
                if (keyRegs) totals.regs += parseFloat(row[keyRegs]) || 0;
                if (keyConvPP) totals.convPP += parseFloat(row[keyConvPP]) || 0;
            });

            const summary = {};
            let hasPlacedSummaryText = false;

            state.headers.forEach((h) => {
                const lowerH = h.toLowerCase().trim();
                
                if (lowerH === 'status') {
                    summary[h] = '';
                    return;
                }

                if (!hasPlacedSummaryText && !state.hiddenColumns.includes(h)) {
                    summary[h] = 'Summary'; 
                    hasPlacedSummaryText = true;
                    return;
                }

                if (lowerH === 'ctr' || lowerH === 'rpc') {
                    summary[h] = '-';
                } else if (lowerH === 'cpa ts') {
                    summary[h] = totals.conv > 0 ? (totals.cost / totals.conv).toFixed(2) : '0.00';
                } else if (lowerH === 'cpc') {
                    summary[h] = totals.clicks > 0 ? (totals.cost / totals.clicks).toFixed(2) : '0.00';
                } else if (lowerH === 'cpr') {
                    summary[h] = totals.regs > 0 ? (totals.cost / totals.regs).toFixed(2) : '0.00';
                } else if (lowerH === 'cpa pp') {
                    summary[h] = totals.convPP > 0 ? (totals.cost / totals.convPP).toFixed(2) : '0.00';
                } else if (lowerH === 'cost') {
                    summary[h] = totals.cost.toFixed(2);
                } else if (lowerH === 'conversions') {
                    summary[h] = totals.conv;
                } else if (lowerH === 'clicks') {
                    summary[h] = totals.clicks;
                } else if (lowerH === 'regs') {
                    summary[h] = totals.regs;
                } else if (lowerH === 'conversion pp') {
                    summary[h] = totals.convPP;
                } else {
                    summary[h] = '';
                }
            });
            return summary;
        };

        // --- UI Rendering ---
        const renderColumnConfig = () => {
            const container = document.getElementById('columnCheckboxes');
            if (!container || state.headers.length === 0) return;

            document.getElementById('columnConfigContainer').classList.remove('hidden');

            let html = '';
            state.columnOrder.forEach(col => {
                const isHidden = state.hiddenColumns.includes(col);
                html += `
                    <label class="flex items-center gap-1.5 px-2 py-1 bg-slate-100 dark:bg-slate-700/50 rounded text-xs cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors border border-slate-200 dark:border-slate-600">
                        <input type="checkbox" class="col-vis-checkbox rounded border-slate-300 text-blue-600 focus:ring-blue-500 bg-white dark:bg-slate-800 dark:border-slate-600 cursor-pointer" value="${col}" ${!isHidden ? 'checked' : ''} />
                        <span class="${isHidden ? 'text-slate-400 dark:text-slate-500' : 'text-slate-700 dark:text-slate-200'}">${col}</span>
                    </label>
                `;
            });
            container.innerHTML = html;
        };

        const renderTable = () => {
            const processedData = getProcessedData();
            const summaryRow = getSummaryRow(processedData);
            const visibleColumns = state.columnOrder.filter(c => !state.hiddenColumns.includes(c));
            
            document.getElementById('recordCount').textContent = `Showing ${processedData.length} records`;

            // Render Head
            let headHTML = '<tr>';
            visibleColumns.forEach(h => {
                const isStatus = h === 'Status';
                const isPinned = state.pinnedColumns.includes(h);
                const sortIconClass = state.sortCol === h ? 'opacity-100 text-blue-500' : 'opacity-0 group-hover:opacity-50';
                
                const pinnedClasses = isPinned ? 'sticky z-30 bg-slate-100 dark:bg-slate-900 border-r-2 border-slate-300 dark:border-slate-600 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]' : '';
                
                headHTML += `
                    <th draggable="true" data-sort="${h}" class="px-2 py-1.5 font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors border-b border-slate-200 dark:border-slate-700 group select-none ${pinnedClasses} ${isStatus ? 'w-12' : ''}">
                        <div class="flex items-center justify-between gap-1 w-full">
                            <div class="flex items-center gap-1 flex-1 cursor-pointer ${isStatus ? 'justify-center' : ''}">
                                <i data-lucide="grip-vertical" class="w-3 h-3 text-slate-400 cursor-grab hover:text-slate-600 flex-shrink-0" title="Drag to reorder"></i>
                                <span class="truncate">${h}</span>
                                <i data-lucide="arrow-up-down" class="w-2.5 h-2.5 transition-opacity ${sortIconClass} flex-shrink-0"></i>
                            </div>
                            <button data-pin="${h}" class="p-0.5 hover:bg-slate-300 dark:hover:bg-slate-700 rounded transition-colors flex-shrink-0" title="${isPinned ? 'Unpin column' : 'Pin column'}">
                                <i data-lucide="${isPinned ? 'pin-off' : 'pin'}" class="w-3 h-3 ${isPinned ? 'text-blue-500' : 'text-slate-400'}"></i>
                            </button>
                        </div>
                    </th>
                `;
            });
            headHTML += '</tr>';
            document.getElementById('tableHead').innerHTML = headHTML;

            // Render Body
            let bodyHTML = '';
            if (processedData.length > 0) {
                processedData.forEach(row => {
                    const isChecked = state.adGroupStatuses[row._adGroupId] !== false;
                    const rowClass = 'bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700/80';
                    
                    bodyHTML += `<tr class="group transition-colors ${rowClass}">`;
                    
                    visibleColumns.forEach(col => {
                        const cellValue = row[col] !== undefined ? row[col] : '';
                        const isIdCol = col && col.toLowerCase().includes('id');
                        const isStatusCol = col === 'Status';
                        const isPinned = state.pinnedColumns.includes(col);
                        
                        let pinnedBg = '';
                        if (isPinned) {
                            pinnedBg = 'bg-slate-50 dark:bg-slate-800 group-hover:bg-slate-100 dark:group-hover:bg-slate-700/80 border-r-2 border-slate-200 dark:border-slate-700 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]';
                        }
                        
                        const cellClass = `px-2 py-1.5 ${isStatusCol ? 'text-center' : ''} ${isPinned ? `sticky z-10 ${pinnedBg}` : ''}`;
                        
                        bodyHTML += `<td class="${cellClass}">`;
                        
                        if (isStatusCol) {
                            bodyHTML += `<input type="checkbox" data-adgroup="${row._adGroupId}" class="status-checkbox w-3.5 h-3.5 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 cursor-pointer" ${isChecked ? 'checked' : ''} />`;
                        } else if (isIdCol && cellValue) {
                            bodyHTML += `
                                <div data-copy="${cellValue}" class="inline-flex items-center gap-1 cursor-pointer text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 hover:underline copy-group" title="Click to copy">
                                    <span class="truncate max-w-[120px] sm:max-w-none">${cellValue}</span>
                                    <i data-lucide="copy" class="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                                </div>
                            `;
                        } else {
                            bodyHTML += `<span>${cellValue}</span>`;
                        }
                        bodyHTML += `</td>`;
                    });
                    bodyHTML += `</tr>`;
                });
            } else {
                bodyHTML = `<tr><td colspan="${visibleColumns.length}" class="px-2 py-8 text-center text-slate-500">No data found matching your criteria.</td></tr>`;
            }
            document.getElementById('tableBody').innerHTML = bodyHTML;

            // Render Foot
            let footHTML = '';
            if (summaryRow && processedData.length > 0) {
                footHTML += '<tr>';
                visibleColumns.forEach(col => {
                    const isPinned = state.pinnedColumns.includes(col);
                    const pinnedClasses = isPinned ? 'sticky z-30 bg-slate-200 dark:bg-slate-700 border-r-2 border-slate-300 dark:border-slate-500 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]' : '';
                    
                    footHTML += `<td class="px-2 py-2 font-bold border-t-2 border-slate-300 dark:border-slate-500 text-slate-900 dark:text-slate-100 ${pinnedClasses}">${summaryRow[col]}</td>`;
                });
                footHTML += '</tr>';
            }
            document.getElementById('tableFoot').innerHTML = footHTML;

            lucide.createIcons();
            
            // Wait for DOM layout to complete before applying sticky positioning
            requestAnimationFrame(updateStickyStyles);
        };

        // --- Event Listeners ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            document.getElementById('startDate').value = getTodayLADate();
            document.getElementById('endDate').value = getTodayLADate();
            document.getElementById('buyerInput').value = state.targetBuyer;
            window.addEventListener('resize', updateStickyStyles);
        });
        
        // Target Buyer Logic
        document.getElementById('buyerInput').addEventListener('input', (e) => {
            state.targetBuyer = e.target.value;
            try {
                localStorage.setItem('tiktok_telegram_target_buyer', state.targetBuyer);
            } catch (err) {}
        });

        // Toggle Controls Logic
        const toggleControlsBtn = document.getElementById('toggleControlsBtn');
        const controlsContainer = document.getElementById('controlsContainer');
        const controlsChevron = document.getElementById('controlsChevron');
        let controlsOpen = true;

        toggleControlsBtn.addEventListener('click', () => {
            controlsOpen = !controlsOpen;
            if(controlsOpen) {
                controlsContainer.classList.remove('hidden');
                controlsChevron.classList.remove('rotate-180');
            } else {
                controlsContainer.classList.add('hidden');
                controlsChevron.classList.add('rotate-180');
            }
        });

        // Search Input
        document.getElementById('searchInput').addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
            renderTable();
        });

        document.getElementById('processBtn').addEventListener('click', handleProcessData);

        // Column Configuration Settings
        document.getElementById('columnCheckboxes').addEventListener('change', (e) => {
            if (e.target.classList.contains('col-vis-checkbox')) {
                toggleColumnVisibility(e.target.value);
            }
        });

        // Table Event Delegation (Sorting, Copy, Checkbox, Pinning)
        document.getElementById('tableSection').addEventListener('click', (e) => {
            const pinBtn = e.target.closest('[data-pin]');
            if (pinBtn) {
                e.stopPropagation();
                togglePin(pinBtn.getAttribute('data-pin'));
                return;
            }

            const th = e.target.closest('th[data-sort]');
            if (th) {
                if(e.target.closest('[data-lucide="grip-vertical"]')) return;
                
                const col = th.getAttribute('data-sort');
                if (state.sortCol === col) {
                    state.sortDesc = !state.sortDesc;
                } else {
                    state.sortCol = col;
                    state.sortDesc = false;
                }
                renderTable();
                return;
            }

            const copyDiv = e.target.closest('[data-copy]');
            if (copyDiv) {
                const text = copyDiv.getAttribute('data-copy');
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast(`Copied: ${text}`);
            }
        });

        document.getElementById('tableSection').addEventListener('change', (e) => {
            if (e.target.classList.contains('status-checkbox')) {
                const adGroupId = e.target.getAttribute('data-adgroup');
                toggleAdGroupStatus(adGroupId);
            }
        });

        // Column Drag and Drop Events
        const tableHead = document.getElementById('tableHead');
        let dragSrcCol = null;

        tableHead.addEventListener('dragstart', (e) => {
            const th = e.target.closest('th');
            if (!th) return;
            dragSrcCol = th.getAttribute('data-sort');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragSrcCol);
            th.classList.add('opacity-50');
        });

        tableHead.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        });

        tableHead.addEventListener('dragenter', (e) => {
            const th = e.target.closest('th');
            if (th && th.getAttribute('data-sort') !== dragSrcCol) {
                th.classList.add('drag-over');
            }
        });

        tableHead.addEventListener('dragleave', (e) => {
            const th = e.target.closest('th');
            if (th) th.classList.remove('drag-over');
        });

        tableHead.addEventListener('drop', (e) => {
            e.stopPropagation();
            const th = e.target.closest('th');
            if (dragSrcCol && th) {
                const destCol = th.getAttribute('data-sort');
                if (dragSrcCol !== destCol) {
                    const fromIdx = state.columnOrder.indexOf(dragSrcCol);
                    const toIdx = state.columnOrder.indexOf(destCol);
                    
                    state.columnOrder.splice(fromIdx, 1);
                    state.columnOrder.splice(toIdx, 0, dragSrcCol);
                    
                    state.columnOrder = [
                        ...state.columnOrder.filter(c => state.pinnedColumns.includes(c)),
                        ...state.columnOrder.filter(c => !state.pinnedColumns.includes(c))
                    ];
                    
                    try {
                        localStorage.setItem('tiktok_telegram_col_order', JSON.stringify(state.columnOrder));
                    } catch(err) {}
                    
                    renderTable();
                }
            }
            return false;
        });

        tableHead.addEventListener('dragend', (e) => {
            const th = e.target.closest('th');
            if (th) th.classList.remove('opacity-50');
            document.querySelectorAll('#tableHead th').forEach(el => el.classList.remove('drag-over'));
        });

        // File Inputs & Drag/Drop
        const handleFileUpload = (type, file) => {
            if (!file) return;
            if (type === 'csv') {
                state.csvFile = file;
                document.getElementById('csvFileName').textContent = file.name;
                document.getElementById('csvIcon').classList.replace('text-green-600', 'text-blue-500');
                document.getElementById('csvDropZone').classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20');
            } else {
                state.htmlFile = file;
                document.getElementById('htmlFileName').textContent = file.name;
                document.getElementById('htmlDropZone').classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20');
            }
        };

        ['csv', 'html'].forEach(type => {
            const input = document.getElementById(`${type}Input`);
            const dropZone = document.getElementById(`${type}DropZone`);

            input.addEventListener('change', (e) => handleFileUpload(type, e.target.files[0]));

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20');
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                if ((type === 'csv' && !state.csvFile) || (type === 'html' && !state.htmlFile)) {
                    dropZone.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20');
                }
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleFileUpload(type, e.dataTransfer.files[0]);
                }
            });
        });

    </script>
</body>
</html>
